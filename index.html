  <script>
    /* Clean-path compatibility: the site is a hash router, but public/SEO URLs
       like /industry/animal-bedding are served index.html by the SPA redirect.
       Translate a non-root pathname into the equivalent hash route once, on load,
       so a direct visit or refresh to /industry/animal-bedding resolves correctly. */
    (function(){
      var p = window.location.pathname;
      if(p && p !== "/" && !/\/(index\.html)?$/.test(p.replace(/\/[^\/]*\.[a-z0-9]+$/i,"/"))){
        var clean = p.replace(/\/+$/,"");
        if(clean && clean !== "/index.html"){
          var hash = window.location.hash && window.location.hash !== "#/" ? window.location.hash : "#" + clean + (window.location.search||"");
          window.history.replaceState(null, "", "/" + (window.location.search||"") + hash);
        }
      }
    })();
  </script>
